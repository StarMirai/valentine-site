<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be My Valentine ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
}

/* ===== CARD STYLE ===== */

.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
}

/* ===== PASSWORD SCREEN ===== */

#display {
    width: 100%;
    height: 50px;
    font-size: 24px;
    text-align: center;
    border-radius: 10px;
    border: none;
    margin-bottom: 20px;
}

.keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.keypad button {
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background-color: white;
    transition: 0.2s;
}

.keypad button:hover {
    background-color: #ff4d6d;
    color: white;
}

/* ===== MAIN CONTENT ===== */

.container {
    display: none;
}

h1 {
    font-size: 26px;
    color: white;
    margin-bottom: 15px;
}

#mainImage {
    width: 100%;
    max-width: 250px;
    border-radius: 15px;
    margin-bottom: 20px;
}

.buttonGroup {
    position: relative;
    height: 80px;
}

.choiceBtn {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    margin: 10px;
}

#yesBtn {
    background-color: #ff4d6d;
    color: white;
}

#noBtn {
    background-color: white;
    color: #ff4d6d;
    position: absolute;
    left: 60%;
    top: 10px;
}

#result {
    display: none;
    margin-top: 20px;
}

#result img {
    width: 100%;
    max-width: 250px;
    border-radius: 15px;
}

/* Shake animation */
@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}
.shake {
    animation: shake 0.3s;
}
</style>
</head>

<body>

<div class="card">

    <!-- PASSWORD SCREEN -->
    <div id="lockScreen">
        <h2 style="color:white;">Enter Secret Code 💖</h2>
        <input type="password" id="display" disabled>

        <div class="keypad">
            <button onclick="press(1)">1</button>
            <button onclick="press(2)">2</button>
            <button onclick="press(3)">3</button>
            <button onclick="press(4)">4</button>
            <button onclick="press(5)">5</button>
            <button onclick="press(6)">6</button>
            <button onclick="press(7)">7</button>
            <button onclick="press(8)">8</button>
            <button onclick="press(9)">9</button>
            <button onclick="clearDisplay()">C</button>
            <button onclick="press(0)">0</button>
            <button onclick="checkPassword()">OK</button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container" id="mainContent">

        <h1 id="question">Will You Be My Valentine? ❤️</h1>
        <img id="mainImage" src="celebrate.gif">

        <div class="buttonGroup">
            <button class="choiceBtn" id="yesBtn">Yes 💖</button>
            <button class="choiceBtn" id="noBtn">No 😢</button>
        </div>

        <div id="result">
            <h2 style="color:white;">YAYYY!! I LOVE YOU HANNNNNN ❤️</h2>
            <img src="oia-uia (1).gif">
        </div>

    </div>

</div>

<audio id="loveAudio" src="Cupid Oiia.mp3"></audio>

<script>
let input = "";
const correctPassword = "0422";

function press(num) {
    if (input.length < 4) {
        input += num;
        document.getElementById("display").value = input;
    }
}

function clearDisplay() {
    input = "";
    document.getElementById("display").value = "";
}

function checkPassword() {
    if (input === correctPassword) {
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
    } else {
        const display = document.getElementById("display");
        display.classList.add("shake");
        setTimeout(() => display.classList.remove("shake"), 300);
        clearDisplay();
    }
}

// Valentine logic
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const result = document.getElementById("result");
const audio = document.getElementById("loveAudio");
const question = document.getElementById("question");
const mainImage = document.getElementById("mainImage");

// Mobile-friendly moving No button
noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("touchstart", moveNo);

function moveNo() {
    const parent = document.querySelector(".buttonGroup");
    const maxX = parent.clientWidth - noBtn.offsetWidth;
    const maxY = parent.clientHeight - noBtn.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

yesBtn.addEventListener("click", function() {
    question.style.display = "none";
    mainImage.style.display = "none";
    document.querySelector(".buttonGroup").style.display = "none";
    result.style.display = "block";
    audio.play();
});
</script>

</body>
</html>
